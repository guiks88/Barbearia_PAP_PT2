<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia João Castro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">Login</h1>
            <nav class="nav">
                <a href="index.html" class="btn btn-secondary">← Voltar</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 680px; padding-top: 2rem; padding-bottom: 2rem;">
        <section class="card" style="margin-bottom: 1.5rem;">
            <h2 style="text-align: center;">Entrar na sua conta</h2>
            <p style="color: var(--color-text-secondary); margin-top: 0.5rem; text-align: center;">
                Use o mesmo email e senha. O sistema encaminha automaticamente para Cliente, Barbeiro ou Administrador.
            </p>

            <form id="unifiedLoginForm" class="auth-form" style="margin-top: 1.25rem;">
                <div class="form-group">
                    <label for="loginEmail">Email *</label>
                    <input type="email" id="loginEmail" placeholder="cliente@email.pt" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Senha *</label>
                    <input type="password" id="loginPassword" placeholder="Mínimo 6 caracteres" autocomplete="current-password" required>
                </div>

                <p style="margin-top: 0.25rem; margin-bottom: 0.75rem; text-align: right;">
                    <a href="#" id="forgotPasswordLink">Esqueceu a sua senha?</a>
                </p>

                <button type="submit" class="btn btn-primary" id="unifiedLoginBtn" style="width: 100%;">Entrar</button>

                <div style="text-align: center; color: var(--color-text-secondary); margin: 0.9rem 0;">ou</div>

                <button type="button" class="google-auth-btn" id="googleLoginBtn" style="width: 100%;" aria-label="Entrar com Google">
                    <span class="google-auth-btn-icon" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img">
                            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.2-1.4 3.6-5.5 3.6-3.3 0-6-2.8-6-6.2s2.7-6.2 6-6.2c1.9 0 3.1.8 3.8 1.4l2.6-2.6C16.8 2.6 14.6 1.7 12 1.7 6.9 1.7 2.8 6 2.8 11.5S6.9 21.3 12 21.3c6.9 0 9.2-5 9.2-7.6 0-.5-.1-.9-.1-1.2H12z"/>
                            <path fill="#34A853" d="M2.8 11.5c0 1.8.7 3.5 1.9 4.7l3.1-2.4c-.5-.7-.8-1.5-.8-2.3s.3-1.6.8-2.3L4.7 6.8C3.5 8 2.8 9.7 2.8 11.5z"/>
                            <path fill="#FBBC05" d="M12 21.3c2.5 0 4.7-.9 6.3-2.4l-3-2.5c-.8.6-1.9 1.1-3.3 1.1-2.5 0-4.6-1.7-5.3-4l-3.1 2.4c1.6 3.2 4.8 5.4 8.4 5.4z"/>
                            <path fill="#4285F4" d="M18.3 18.9c1.8-1.7 2.9-4.1 2.9-7.1 0-.5-.1-.9-.1-1.2H12v3.9h5.5c-.3 1.3-1 2.4-2.1 3.2l2.9 2.2z"/>
                        </svg>
                    </span>
                    <span id="googleLoginBtnLabel">Continuar com Google</span>
                </button>
            </form>

            <p style="margin-top: 1rem; color: var(--color-text-secondary); text-align: center;">
                Ainda não tem conta de cliente?
                <a href="bookings.html">Criar conta</a>
            </p>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Barbearia João Castro. Todos os direitos reservados.</p>
            <a href="index.html" class="admin-link">Início</a>
        </div>
    </footer>

    <script type="module" src="login.js"></script>
</body>
</html>
