<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo de Cliente - Barbearia João Castro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="logo">Registo de Cliente</h1>
            <p class="subtitle">Crie a sua conta para fazer marcações</p>
            
            <form id="clientRegisterForm">
                <div class="form-group">
                    <label for="clientName">Nome Completo *</label>
                    <input type="text" id="clientName" required>
                </div>
                
                <div class="form-group">
                    <label for="clientEmail">Email *</label>
                    <input type="email" id="clientEmail" required>
                </div>
                
                <div class="form-group">
                    <label for="clientPhone">Telefone *</label>
                    <input type="tel" id="clientPhone" maxlength="9" required>
                    <small style="color: var(--color-text-secondary); font-size: 0.85rem;">Formato: 9 dígitos</small>
                </div>
                
                <div class="form-group">
                    <label for="clientPassword">Senha *</label>
                    <input type="password" id="clientPassword" required minlength="6">
                    <small style="color: var(--color-text-secondary); font-size: 0.85rem;">Mínimo 6 caracteres</small>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Registar</button>
            </form>

            <div style="text-align: center; color: var(--color-text-secondary); margin: 0.9rem 0;">ou</div>

            <button type="button" class="google-auth-btn" id="googleRegisterBtn" style="width: 100%;" aria-label="Criar conta com Google">
                <span class="google-auth-btn-icon" aria-hidden="true">
                    <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img">
                        <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.2-1.4 3.6-5.5 3.6-3.3 0-6-2.8-6-6.2s2.7-6.2 6-6.2c1.9 0 3.1.8 3.8 1.4l2.6-2.6C16.8 2.6 14.6 1.7 12 1.7 6.9 1.7 2.8 6 2.8 11.5S6.9 21.3 12 21.3c6.9 0 9.2-5 9.2-7.6 0-.5-.1-.9-.1-1.2H12z"/>
                        <path fill="#34A853" d="M2.8 11.5c0 1.8.7 3.5 1.9 4.7l3.1-2.4c-.5-.7-.8-1.5-.8-2.3s.3-1.6.8-2.3L4.7 6.8C3.5 8 2.8 9.7 2.8 11.5z"/>
                        <path fill="#FBBC05" d="M12 21.3c2.5 0 4.7-.9 6.3-2.4l-3-2.5c-.8.6-1.9 1.1-3.3 1.1-2.5 0-4.6-1.7-5.3-4l-3.1 2.4c1.6 3.2 4.8 5.4 8.4 5.4z"/>
                        <path fill="#4285F4" d="M18.3 18.9c1.8-1.7 2.9-4.1 2.9-7.1 0-.5-.1-.9-.1-1.2H12v3.9h5.5c-.3 1.3-1 2.4-2.1 3.2l2.9 2.2z"/>
                    </svg>
                </span>
                <span id="googleRegisterBtnLabel">Criar conta com Google</span>
            </button>
            
            <div class="auth-footer">
                <p>Já tem conta? <a href="login.html" class="auth-inline-link">Fazer Login</a></p>
                <a href="index.html">← Voltar à página inicial</a>
            </div>
        </div>
    </div>
    
    <script type="module" src="client-register.js"></script>
</body>
</html>
