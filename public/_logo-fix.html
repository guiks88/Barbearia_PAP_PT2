<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>logo-fix</title>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    canvas { width: 512px; height: 512px; display: block; }
  </style>
</head>
<body>
  <canvas id="out" width="512" height="512"></canvas>
  <script>
    (function () {
      const W = 512;
      const H = 512;

      const out = document.getElementById('out');
      const ctxOut = out.getContext('2d', { willReadFrequently: true });

      const srcCanvas = document.createElement('canvas');
      srcCanvas.width = W;
      srcCanvas.height = H;
      const ctxSrc = srcCanvas.getContext('2d', { willReadFrequently: true });

      const idx = (x, y) => y * W + x;

      function buildMask(imageData) {
        const { data } = imageData;
        const mask = new Uint8Array(W * H);
        for (let i = 0, p = 0; i < data.length; i += 4, p++) {
          const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
          mask[p] = (a > 20 && r < 80 && g < 80 && b < 80) ? 1 : 0;
        }
        return mask;
      }

      function findComponents(mask, x0, y0, x1, y1) {
        const visited = new Uint8Array(W * H);
        const comps = [];
        for (let y = y0; y < y1; y++) {
          for (let x = x0; x < x1; x++) {
            const start = idx(x, y);
            if (!mask[start] || visited[start]) continue;

            let minX = x, maxX = x, minY = y, maxY = y, size = 0;
            const stack = [start];
            visited[start] = 1;

            while (stack.length) {
              const p = stack.pop();
              const py = Math.floor(p / W);
              const px = p - py * W;
              size++;
              if (px < minX) minX = px;
              if (px > maxX) maxX = px;
              if (py < minY) minY = py;
              if (py > maxY) maxY = py;

              if (px > x0) {
                const n = p - 1;
                if (mask[n] && !visited[n]) { visited[n] = 1; stack.push(n); }
              }
              if (px + 1 < x1) {
                const n = p + 1;
                if (mask[n] && !visited[n]) { visited[n] = 1; stack.push(n); }
              }
              if (py > y0) {
                const n = p - W;
                if (mask[n] && !visited[n]) { visited[n] = 1; stack.push(n); }
              }
              if (py + 1 < y1) {
                const n = p + W;
                if (mask[n] && !visited[n]) { visited[n] = 1; stack.push(n); }
              }
            }

            comps.push({
              seed: start,
              size,
              bbox: { minX, minY, maxX, maxY },
              minY,
              maxY,
            });
          }
        }
        return comps;
      }

      function pickTop(comps) {
        const filtered = comps.filter(c => c.size > 200);
        if (!filtered.length) return null;
        filtered.sort((a, b) => (a.minY - b.minY) || (b.size - a.size));
        return filtered[0];
      }

      function pickBottom(comps) {
        const filtered = comps.filter(c => c.size > 400);
        if (!filtered.length) return null;
        filtered.sort((a, b) => (b.maxY - a.maxY) || (b.size - a.size));
        return filtered[0];
      }

      function collectComponentPixels(mask, seed, x0, y0, x1, y1) {
        const visited = new Uint8Array(W * H);
        const pixels = [];
        const stack = [seed];
        visited[seed] = 1;
        while (stack.length) {
          const p = stack.pop();
          pixels.push(p);
          const py = Math.floor(p / W);
          const px = p - py * W;

          if (px > x0) {
            const n = p - 1;
            if (mask[n] && !visited[n]) { visited[n] = 1; stack.push(n); }
          }
          if (px + 1 < x1) {
            const n = p + 1;
            if (mask[n] && !visited[n]) { visited[n] = 1; stack.push(n); }
          }
          if (py > y0) {
            const n = p - W;
            if (mask[n] && !visited[n]) { visited[n] = 1; stack.push(n); }
          }
          if (py + 1 < y1) {
            const n = p + W;
            if (mask[n] && !visited[n]) { visited[n] = 1; stack.push(n); }
          }
        }
        return pixels;
      }

      function paintFix(srcImageData, mask, leftPixels, rightPixels) {
        const outData = new Uint8ClampedArray(srcImageData.data);

        // Erase old right pixels only
        for (const p of rightPixels) {
          const i = p * 4;
          outData[i] = 255;
          outData[i + 1] = 255;
          outData[i + 2] = 255;
          outData[i + 3] = 255;
        }

        // Draw mirrored left pixels onto right
        for (const p of leftPixels) {
          const y = Math.floor(p / W);
          const x = p - y * W;
          const mx = (W - 1) - x;
          const mp = idx(mx, y);
          const si = p * 4;
          const di = mp * 4;
          outData[di] = srcImageData.data[si];
          outData[di + 1] = srcImageData.data[si + 1];
          outData[di + 2] = srcImageData.data[si + 2];
          outData[di + 3] = srcImageData.data[si + 3];
        }

        return new ImageData(outData, W, H);
      }

      window.__done = false;
      const img = new Image();
      img.onload = () => {
        ctxSrc.clearRect(0, 0, W, H);
        ctxSrc.drawImage(img, 0, 0, W, H);

        const srcImageData = ctxSrc.getImageData(0, 0, W, H);
        const mask = buildMask(srcImageData);

        // blades (top band)
        const topBandY1 = 160;
        const compsTopL = findComponents(mask, 0, 0, 256, topBandY1);
        const compsTopR = findComponents(mask, 256, 0, 512, topBandY1);
        const bladeL = pickTop(compsTopL);
        const bladeR = pickTop(compsTopR);

        // handles (bottom band)
        const botBandY0 = 260;
        const compsBotL = findComponents(mask, 0, botBandY0, 256, 512);
        const compsBotR = findComponents(mask, 256, botBandY0, 512, 512);
        const handleL = pickBottom(compsBotL);
        const handleR = pickBottom(compsBotR);

        let fixed = srcImageData;

        if (bladeL && bladeR) {
          const leftPixels = collectComponentPixels(mask, bladeL.seed, 0, 0, 256, topBandY1);
          const rightPixels = collectComponentPixels(mask, bladeR.seed, 256, 0, 512, topBandY1);
          fixed = paintFix(fixed, mask, leftPixels, rightPixels);
        }

        if (handleL && handleR) {
          const leftPixels = collectComponentPixels(mask, handleL.seed, 0, botBandY0, 256, 512);
          const rightPixels = collectComponentPixels(mask, handleR.seed, 256, botBandY0, 512, 512);
          fixed = paintFix(fixed, mask, leftPixels, rightPixels);
        }

        ctxOut.putImageData(fixed, 0, 0);
        window.__done = true;
      };
      img.onerror = () => { window.__done = 'error'; };
      img.src = 'publiclogo-barbearia.png.png';
    })();
  </script>
</body>
</html>
